<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Đọc Mở Rộng Lớp 2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #FF6B81;
            --secondary-color: #FFA502;
            --accent-color: #2ED573;
            --bg-color: #FFF9E6;
            --text-color: #4A4A4A;
            --card-bg: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Comic Sans MS, sans-serif; }
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#FFF 20%, transparent 20%), radial-gradient(#FFF 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: var(--text-color);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #FF6B81, #FFA502, #7BED9F);
            padding: 30px 20px;
            border-radius: 30px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(255, 107, 129, 0.2);
        }

        header h1 { font-size: 30px; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); margin-bottom: 10px; }
        header .sub-title {
            font-size: 22px; font-weight: bold; background: rgba(255,255,255,0.2);
            display: inline-block; padding: 5px 25px; border-radius: 20px;
        }

        .decor-icon { position: absolute; font-size: 24px; opacity: 0.7; animation: float 4s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(15deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .dashboard {
            display: flex; justify-content: space-around; background: white; padding: 15px;
            border-radius: 20px; margin-bottom: 25px; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 3px dashed var(--secondary-color);
        }
        .score-box { color: #FF4757; }
        .progress-box { color: var(--accent-color); }

        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .tab-btn {
            padding: 12px 25px; font-size: 16px; font-weight: bold; border: none;
            border-radius: 50px; cursor: pointer; background-color: #FFEAA7; color: #d35400;
            box-shadow: 0 4px 0 #ECCC68; transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #FF6B81; color: white; box-shadow: 0 4px 0 #FF4757; transform: translateY(-2px);
        }

        .lesson-container {
            display: none; grid-template-columns: 1fr 1fr; gap: 25px;
            background: var(--card-bg); padding: 30px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #FFE4E6;
        }
        .lesson-container.active { display: grid; }
        @media (max-width: 900px) { .lesson-container { grid-template-columns: 1fr; } }

        .reading-panel { background: #FFFDF0; padding: 25px; border-radius: 20px; border: 3px solid #FFEAA7; text-align: center; }
        .audio-btn {
            background: linear-gradient(to right, #FF1E56, #FFAC41); color: white; border: none;
            padding: 12px 25px; border-radius: 25px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255, 30, 86, 0.3);
        }

        .img-container { width: 100%; max-width: 320px; margin: 0 auto 20px auto; border-radius: 15px; overflow: hidden; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .img-container img { width: 100%; height: auto; display: block; }
        .text-content { font-size: 19px; line-height: 1.8; white-space: pre-line; text-align: left; padding: 15px; background: white; border-radius: 15px; }
        .author-text { text-align: right; font-style: italic; color: #7f8c8d; margin-top: 10px; font-size: 16px; }
        .note-text { background: #E8F8F5; padding: 10px; border-radius: 10px; font-size: 15px; margin-top: 15px; text-align: left; border-left: 4px solid var(--accent-color); }

        .exercise-panel { background: #FDFEFE; padding: 25px; border-radius: 20px; border
